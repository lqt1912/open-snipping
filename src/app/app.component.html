<!-- OVERLAY WINDOW -->
<ng-container *ngIf="mode === 'overlay'">
  <app-overlay></app-overlay>
</ng-container>

<!-- MAIN: LAUNCHER -->
<ng-container *ngIf="mode === 'launcher'">
  <div class="launcher">
    <div class="brand">
      <svg class="scissors-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="6" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.5"/>
        <line x1="8.5" y1="7.5" x2="19.5" y2="18.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="8.5" y1="16.5" x2="14" y2="11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="9" x2="19.5" y2="5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">Open Snipping</span>
    </div>

    <button class="capture-btn" (click)="startCapture()">
      <svg viewBox="0 0 20 20" fill="none">
        <rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/>
        <circle cx="10" cy="11" r="3" stroke="currentColor" stroke-width="1.4"/>
        <path d="M7 5l1.5-2h3L13 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      New Capture
    </button>

    <!-- Configurable shortcut display -->
    <div class="shortcut-area">
      <button class="shortcut-btn"
              *ngIf="!isRecording"
              (click)="startRecording()"
              title="Click to change shortcut">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round">
          <rect x="1" y="3" width="12" height="8" rx="1.5"/>
          <line x1="3.5" y1="6.5" x2="3.5" y2="6.5" stroke-width="2"/>
          <line x1="6"   y1="6.5" x2="8"   y2="6.5"/>
        </svg>
        <kbd>{{ currentHotkey }}</kbd>
      </button>

      <button class="shortcut-btn recording"
              *ngIf="isRecording"
              (click)="cancelRecording()">
        <span class="pulse-dot"></span>
        Press shortcut… <span class="esc-hint">Esc to cancel</span>
      </button>

      <p class="shortcut-error" *ngIf="hotkeyError">{{ hotkeyError }}</p>
    </div>
  </div>
</ng-container>

<!-- MAIN: EDITOR -->
<ng-container *ngIf="mode === 'editor'">
  <app-editor
    *ngIf="croppedImagePath"
    [imagePath]="croppedImagePath"
    (closed)="onEditorClosed()"
    (newCapture)="startCapture()">
  </app-editor>
</ng-container>
