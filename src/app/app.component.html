<!-- OVERLAY WINDOW -->
<ng-container *ngIf="mode === 'overlay'">
  <app-overlay></app-overlay>
</ng-container>

<!-- MAIN: LAUNCHER -->
<ng-container *ngIf="mode === 'launcher'">
  <div class="launcher">
    <h1>✂️ Open Snipping</h1>
    <p>Select a region of your screen to capture</p>
    <button class="capture-btn" (click)="startCapture()">
      📷 New Capture
    </button>
  </div>
</ng-container>

<!-- MAIN: EDITOR -->
<ng-container *ngIf="mode === 'editor'">
  <app-editor
    *ngIf="croppedImagePath"
    [imagePath]="croppedImagePath"
    (closed)="onEditorClosed()"
    (newCapture)="startCapture()">
  </app-editor>
</ng-container>
