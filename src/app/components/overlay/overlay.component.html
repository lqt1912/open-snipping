<div class="screenshot-bg" [style.backgroundImage]="bgUrl"></div>

<div class="overlay-root select-none"
     [class.is-capturing]="isCapturing"
     [class.cursor-crosshair]="!isCapturing"
     (mousedown)="onMouseDown($event)"
     (mousemove)="onMouseMove($event)"
     (mouseup)="onMouseUp()">

  <!-- Selection Box — visible only while user is dragging -->
  <div *ngIf="isSelecting && selection"
       class="selection-box"
       [ngStyle]="{
         'left.px': selection.x,
         'top.px': selection.y,
         'width.px': selection.width,
         'height.px': selection.height
       }">
  </div>
</div>
