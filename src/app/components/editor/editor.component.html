<div class="editor-shell" tabindex="0">

  <!-- ══════════════════════ TOOLBAR ══════════════════════ -->
  <div class="editor-toolbar">

    <!-- Brand -->
    <span class="brand">✂ Open Snipping</span>
    <div class="divider"></div>

    <!-- ── Drawing Tools ── -->
    <div class="tool-group" role="toolbar" aria-label="Drawing tools">
      <button id="tool-pen"
              class="tool-btn" [class.active]="activeTool === 'pen'"
              (click)="setTool('pen')" title="Pen – freehand draw">
        🖊
      </button>
      <button id="tool-highlight"
              class="tool-btn" [class.active]="activeTool === 'highlight'"
              (click)="setTool('highlight')" title="Highlight">
        🖍
      </button>
      <button id="tool-rectangle"
              class="tool-btn" [class.active]="activeTool === 'rectangle'"
              (click)="setTool('rectangle')" title="Rectangle">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="12" height="8" rx="1"/>
        </svg>
      </button>
      <button id="tool-arrow"
              class="tool-btn" [class.active]="activeTool === 'arrow'"
              (click)="setTool('arrow')" title="Arrow">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="14" x2="13" y2="3"/>
          <polyline points="7,3 13,3 13,9"/>
        </svg>
      </button>
      <button id="tool-text"
              class="tool-btn" [class.active]="activeTool === 'text'"
              (click)="setTool('text')" title="Text">
        <span style="font-weight:700;font-size:14px">T</span>
      </button>
      <button id="tool-none"
              class="tool-btn" [class.active]="activeTool === 'none'"
              (click)="setTool('none')" title="View / No tool">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M3 2l10 5-5 1.5L6.5 14z"/>
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- ── Color + Width ── -->
    <div class="tool-group" role="group" aria-label="Color and stroke width">
      <!-- Preset swatches -->
      <div class="color-swatches">
        <button *ngFor="let c of presetColors"
                class="swatch"
                [class.active]="strokeColor === c"
                [style.background]="c"
                (click)="setColor(c)"
                [title]="c">
        </button>
      </div>
      <!-- Custom color picker -->
      <label class="color-picker-wrap" title="Custom color">
        <input type="color" [(ngModel)]="strokeColor" class="color-picker-input">
        <span class="color-picker-icon">🎨</span>
      </label>

      <div class="width-control">
        <input id="stroke-width-slider"
               type="range" min="1" max="20" step="1"
               [(ngModel)]="strokeWidth"
               class="width-slider">
        <span class="width-label">{{ strokeWidth }}px</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ── Undo / Clear ── -->
    <div class="tool-group">
      <button id="btn-undo"
              class="action-btn" [disabled]="!canUndo"
              (click)="undo()" title="Undo (Ctrl+Z)">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M3 7a5 5 0 1 1 1 4.5"/>
          <polyline points="3,3 3,7 7,7"/>
        </svg>
        Undo
      </button>
      <button id="btn-clear"
              class="action-btn danger"
              (click)="clearAll()" title="Clear all drawings">
        🗑 Clear
      </button>
    </div>

    <div class="divider"></div>

    <!-- ── Zoom ── -->
    <div class="tool-group zoom-group">
      <button id="btn-zoom-out" class="zoom-btn" (click)="zoomOut()" title="Zoom out (Ctrl+Scroll)">−</button>
      <button id="btn-zoom-reset" class="zoom-label" (click)="resetZoom()" title="Reset zoom to 100%">
        {{ zoomPercent }}
      </button>
      <button id="btn-zoom-in" class="zoom-btn" (click)="zoomIn()" title="Zoom in (Ctrl+Scroll)">+</button>
      <button id="btn-zoom-fit" class="action-btn fit-btn" (click)="fitToViewport()" title="Fit to window">Fit</button>
    </div>

    <!-- Spacer -->
    <div class="spacer"></div>

    <!-- ── Actions ── -->
    <div class="tool-group">
      <button id="btn-new-capture"
              class="action-btn primary"
              (click)="newCaptureRequest()" title="Take a new screenshot">
        📷 New
      </button>
      <button id="btn-copy"
              class="action-btn"
              [class.success]="copySuccess"
              [disabled]="isCopying"
              (click)="copyToClipboard()"
              title="Copy to clipboard (with annotations)">
        {{ copySuccess ? '✓ Copied!' : (isCopying ? '⏳ Copying…' : '📋 Copy') }}
      </button>
      <button id="btn-save"
              class="action-btn save"
              [disabled]="isSaving"
              (click)="saveAs()"
              title="Save as PNG (with annotations)">
        {{ isSaving ? '⏳ Saving…' : '💾 Save As' }}
      </button>
    </div>

  </div><!-- /toolbar -->

  <!-- ══════════════════════ CANVAS VIEWPORT ══════════════════════ -->
  <div class="canvas-viewport"
       #canvasViewport
       (wheel)="onWheel($event)">

    <!-- Wrapper scales with zoom; CSS width/height create scroll region -->
    <div class="canvas-wrapper"
         [style.width.px]="canvasDisplayWidth"
         [style.height.px]="canvasDisplayHeight">
      <!-- Layer 1: image (read-only) -->
      <canvas #imageCanvas class="canvas-layer image-canvas"></canvas>
      <!-- Layer 2: annotations (receives all pointer events) -->
      <canvas #drawCanvas
              class="canvas-layer draw-canvas"
              [ngClass]="cursorClass"
              (mousedown)="onCanvasMouseDown($event)"
              (mousemove)="onCanvasMouseMove($event)"
              (mouseup)="onCanvasMouseUp($event)"
              (mouseleave)="onCanvasMouseLeave($event)">
      </canvas>
    </div>

    <!-- Empty state / loading indicator -->
    <div *ngIf="!canvasDisplayWidth" class="empty-state">
      <div class="empty-icon">🖼</div>
      <p>Loading image…</p>
    </div>

  </div><!-- /canvas-viewport -->

  <!-- ══════════════════════ TEXT INPUT OVERLAY ══════════════════════ -->
  <input *ngIf="showTextInput"
         #textInput
         id="text-tool-input"
         class="text-tool-input"
         [style.left.px]="textInputScreenPos.x"
         [style.top.px]="textInputScreenPos.y"
         [style.color]="strokeColor"
         [(ngModel)]="textInputValue"
         (keydown.enter)="confirmText()"
         (keydown.escape)="cancelText()"
         placeholder="Type then press Enter…">

</div>
